<header class="header">
  <div class="container">
    <div class="header__logo">
      <a href="/" class="header__logo-link" title="Перейти на главную страницу">
        <picture>
          <source media="(min-width: 992px)" srcset="@img/logo-full.svg" width="246" height="36" />
          <img
            src="@img/logo.svg"
            class="header__logo-img"
            width="213"
            height="32"
            alt="Клуб четырех коней"
          />
        </picture>
      </a>
    </div>

    <div class="header__hero">
      <div class="header__hero-slogan">
        Превратите уездный город
        <span class="header__hero-slogan-center">в столицу земного шара</span>
      </div>

      <div class="header__hero-text">
        Оплатите взнос на телеграммы для организации Международного васюкинского турнира по шахматам
      </div>

      <div class="header__hero-buttons">
        <a href="#support" class="header__hero-button button button--dark">
          Поддержать <br />
          шахматную мысль
        </a>
        <a href="#more" class="header__hero-button button button--white">
          Подробнее <br />
          o турнире
        </a>
      </div>
    </div>
  </div>
</header>
